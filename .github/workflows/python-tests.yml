name: Python tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create config.ini for tests
        run: |
          @"
          [Database]
          user = test_user
          password = test_password
          host = localhost
          port = 3306
          database = test_eticket
          "@ | Out-File -FilePath config.ini -Encoding UTF8
      - name: Run tests
        run: |
          python auth_test.py
          python reservation_test.py
          python event_category_test.py
          python top_events_test.py
