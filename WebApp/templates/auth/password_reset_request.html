{% extends 'base.html' %}
{% block content %}
<h2>Elfelejtett jelszó</h2>
<p>Add meg az e-mail címed, és küldünk egy visszaállító linket.</p>
<form method="post">
    {{ form.csrf_token }}
    <div>{{ form.email.label }}<br>{{ form.email(size=40) }}</div>
    <div>{{ form.submit() }}</div>
</form>
{% endblock %}
